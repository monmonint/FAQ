<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FAQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0a0f1e;
    color: #e2e8f0;
}

/* HEADER */
header {
    padding: 50px 20px;
    text-align: center;
    background: linear-gradient(135deg,#2563eb,#7c3aed);
}

header h1 {
    margin: 0;
    font-size: 42px;
}

header input {
    margin-top: 15px;
    padding: 14px;
    width: 60%;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 16px;
}

/* LAYOUT */
.container {
    max-width: 900px;
    margin: auto;
    padding: 25px;
}

/* CATEGORY */
.category {
    margin-top: 35px;
    font-size: 18px;
    border-left: 4px solid #6366f1;
    padding-left: 10px;
    opacity: 0.9;
}

/* ITEM */
.item {
    background: #111a2e;
    margin-top: 10px;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.2s;
}

.item:hover {
    transform: translateY(-2px);
}

.q {
    padding: 15px;
    cursor: pointer;
    font-weight: 600;
}

.q:hover {
    background: #1e2a44;
}

.a {
    display: none;
    padding: 15px;
    border-top: 1px solid #22304d;
    color: #cbd5e1;
}

/* SUGGESTIONS */
.suggestions {
    margin-top: 10px;
    text-align: left;
    width: 60%;
    margin-left: auto;
    margin-right: auto;
}

.suggestion {
    background: #111a2e;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}

.suggestion:hover {
    background: #1e2a44;
}
</style>
</head>

<body>

<header>
<h1>📘 FAQ du Serveur</h1>
<input id="search" placeholder="Rechercher une question...">
<div class="suggestions" id="suggestions"></div>
</header>

<div class="container" id="faq"></div>

<script>

let data = [];

/* LOAD JSON */
fetch("./faq.json")
.then(r => r.json())
.then(json => {
    data = json;
    render(data);
});

/* RENDER */
function render(list) {
    const container = document.getElementById("faq");
    container.innerHTML = "";

    const groups = {};

    list.forEach(i => {
        if (!groups[i.category]) groups[i.category] = [];
        groups[i.category].push(i);
    });

    for (let cat in groups) {
        const title = document.createElement("div");
        title.className = "category";
        title.innerText = "📁 " + cat;
        container.appendChild(title);

        groups[cat].forEach(item => {
            const div = document.createElement("div");
            div.className = "item";

            div.innerHTML = `
                <div class="q">${item.question}</div>
                <div class="a">${item.answer}</div>
            `;

            div.querySelector(".q").onclick = () => {
                const a = div.querySelector(".a");
                a.style.display = a.style.display === "block" ? "none" : "block";
            };

            container.appendChild(div);
        });
    }
}

/* 🔍 SMART SEARCH */
function scoreMatch(text, query) {
    const words = query.toLowerCase().split(" ");
    let score = 0;

    for (let w of words) {
        if (text.includes(w)) score += 2;
        else if (text.split(" ").some(t => t.startsWith(w))) score += 1;
    }

    return score;
}

/* INPUT SEARCH */
document.getElementById("search").addEventListener("input", e => {
    const value = e.target.value.toLowerCase();
    const suggestionsBox = document.getElementById("suggestions");

    if (!value) {
        render(data);
        suggestionsBox.innerHTML = "";
        return;
    }

    let scored = data.map(item => {
        let text = (item.question + " " + item.answer + " " + item.category).toLowerCase();
        return { item, score: scoreMatch(text, value) };
    });

    scored = scored
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score);

    const filtered = scored.map(x => x.item);

    render(filtered);

    /* 🔥 suggestions */
    suggestionsBox.innerHTML = "";

    scored.slice(0, 5).forEach(x => {
        const div = document.createElement("div");
        div.className = "suggestion";
        div.innerText = x.item.question;

        div.onclick = () => {
            document.getElementById("search").value = x.item.question;
            render([x.item]);
            suggestionsBox.innerHTML = "";
        };

        suggestionsBox.appendChild(div);
    });
});

</script>

</body>
</html>
