<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FAQ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0b1220;
    color: #e2e8f0;
}

header {
    padding: 40px;
    text-align: center;
    background: linear-gradient(135deg,#3b82f6,#8b5cf6);
}

header h1 {
    margin: 0;
    font-size: 38px;
}

header input {
    margin-top: 15px;
    padding: 12px;
    width: 60%;
    border-radius: 10px;
    border: none;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 25px;
}

.category {
    margin-top: 35px;
    font-size: 20px;
    border-left: 4px solid #6366f1;
    padding-left: 10px;
}

.item {
    background: #111a2e;
    margin-top: 10px;
    border-radius: 12px;
}

.q {
    padding: 15px;
    cursor: pointer;
    font-weight: bold;
}

.q:hover { background:#1e2a44; }

.a {
    display: none;
    padding: 15px;
    border-top: 1px solid #22304d;
    color: #cbd5e1;
}

form {
    margin-top: 60px;
    background: #111a2e;
    padding: 20px;
    border-radius: 12px;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #0b1220;
    color: white;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #6366f1;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #4f46e5;
}
</style>
</head>

<body>

<header>
<h1>📘 FAQ du Serveur</h1>
<input id="search" placeholder="Rechercher...">
</header>

<div class="container" id="faq"></div>

<div class="container">

<h2>❓ Poser une question</h2>

<form action="https://formspree.io/f/mdaybojz" method="POST">
    <input name="question" type="text" placeholder="Ta question" required>
    <textarea name="details" placeholder="Détails (optionnel)"></textarea>
    <button type="submit">Envoyer</button>
</form>

</div>

<script>

let data = [];

/* LOAD FAQ */
fetch("./faq.json")
.then(r => r.json())
.then(json => {
    data = json;
    render(json);
});

/* RENDER */
function render(list) {
    const container = document.getElementById("faq");
    container.innerHTML = "";

    const groups = {};

    list.forEach(i => {
        if (!groups[i.category]) groups[i.category] = [];
        groups[i.category].push(i);
    });

    for (let cat in groups) {
        const title = document.createElement("div");
        title.className = "category";
        title.innerText = "📁 " + cat;
        container.appendChild(title);

        groups[cat].forEach(item => {
            const div = document.createElement("div");
            div.className = "item";

            div.innerHTML = `
                <div class="q">${item.question}</div>
                <div class="a">${item.answer}</div>
            `;

            div.querySelector(".q").onclick = () => {
                const a = div.querySelector(".a");
                a.style.display = a.style.display === "block" ? "none" : "block";
            };

            container.appendChild(div);
        });
    }
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e => {
    const v = e.target.value.toLowerCase();

    const filtered = data.filter(x =>
        x.question.toLowerCase().includes(v) ||
        x.answer.toLowerCase().includes(v) ||
        x.category.toLowerCase().includes(v)
    );

    render(filtered);
});

</script>

</body>
</html>
