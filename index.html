<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FAQ - Issues Style</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0d1117;
    color: #c9d1d9;
}

/* HEADER */
header {
    padding: 40px;
    text-align: center;
    border-bottom: 1px solid #30363d;
}

header h1 {
    margin: 0;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* ISSUE STYLE */
.issue {
    border: 1px solid #30363d;
    background: #161b22;
    padding: 15px;
    border-radius: 8px;
    margin-top: 10px;
}

.title {
    font-weight: bold;
    cursor: pointer;
}

.answer {
    display: none;
    margin-top: 10px;
    color: #8b949e;
}

/* FORM */
form {
    margin-top: 40px;
    border: 1px solid #30363d;
    background: #161b22;
    padding: 15px;
    border-radius: 8px;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    color: white;
    border-radius: 6px;
}

button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: #238636;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2ea043;
}

.small {
    font-size: 12px;
    color: #8b949e;
}
</style>
</head>

<body>

<header>
<h1>📦 FAQ (GitHub Issues Style)</h1>
</header>

<div class="container" id="faq"></div>

<div class="container">

<h2>❓ Poser une question</h2>

<form id="formspreeForm">
    <input id="question" placeholder="Ta question" required>
    <textarea id="details" placeholder="Détails"></textarea>
    <button type="submit">Envoyer</button>
    <div class="small">Envoie via email + ajout automatique dans la FAQ</div>
</form>

</div>

<script>

/* =========================
   CONFIG
========================= */

const TOKEN = "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";
const OWNER = "monmonint";
const REPO = "FAQ";
const PATH = "faq.json";
const BRANCH = "main";

/* =========================
   LOAD FAQ
========================= */

let faqData = [];

async function loadFAQ() {
    const res = await fetch("./faq.json");
    faqData = await res.json();
    render(faqData);
}

/* =========================
   RENDER (GitHub Issues style)
========================= */

function render(data) {
    const container = document.getElementById("faq");
    container.innerHTML = "";

    data.forEach((item, i) => {
        const div = document.createElement("div");
        div.className = "issue";

        div.innerHTML = `
            <div class="title">#${i+1} ${item.question}</div>
            <div class="answer">${item.answer}</div>
        `;

        div.querySelector(".title").onclick = () => {
            const a = div.querySelector(".answer");
            a.style.display = a.style.display === "block" ? "none" : "block";
        };

        container.appendChild(div);
    });
}

/* =========================
   ADD QUESTION TO GITHUB
========================= */

async function addToGithub(question) {

    const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
        {
            headers: {
                Authorization: `token ${TOKEN}`
            }
        }
    );

    const file = await res.json();
    const content = atob(file.content);
    const json = JSON.parse(content);

    json.push({
        category: "Utilisateur",
        question: question,
        answer: "en attente"
    });

    const updated = btoa(JSON.stringify(json, null, 2));

    await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`,
        {
            method: "PUT",
            headers: {
                Authorization: `token ${TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "Ajout FAQ question",
                content: updated,
                sha: file.sha,
                branch: BRANCH
            })
        }
    );
}

/* =========================
   FORM SUBMIT
========================= */

document.getElementById("formspreeForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const q = document.getElementById("question").value;
    const d = document.getElementById("details").value;

    /* 1. Formspree email */
    fetch("https://formspree.io/f/mdaybojz", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            question: q,
            details: d
        })
    });

    /* 2. GitHub JSON update */
    await addToGithub(q);

    alert("Question envoyée !");
});

/* INIT */
loadFAQ();

</script>

</body>
</html>
