<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>FAQ du Serveur</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: system-ui, Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

/* HEADER */

header {
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    padding: 50px 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 42px;
    font-weight: 700;
}

header p {
    margin-top: 10px;
    opacity: 0.95;
    font-size: 16px;
}

/* SEARCH */

.search-box {
    margin-top: 25px;
    display: flex;
    justify-content: center;
}

#search {
    width: 100%;
    max-width: 650px;
    padding: 14px 18px;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    outline: none;
    background: white;
    color: #111827;
}

/* LAYOUT */

.container {
    max-width: 950px;
    margin: auto;
    padding: 30px 20px;
}

/* ASK QUESTION CARD */

.ask-card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 18px;
    padding: 24px;
    margin-top: -40px;
    position: relative;
    z-index: 2;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.ask-card h2 {
    margin-top: 0;
    margin-bottom: 10px;
}

.ask-card p {
    margin-top: 0;
    color: #94a3b8;
    font-size: 14px;
}

input,
textarea {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    border: 1px solid #334155;
    border-radius: 12px;
    background: #0f172a;
    color: white;
    font-size: 15px;
    outline: none;
}

textarea {
    min-height: 120px;
    resize: vertical;
}

button {
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #4f46e5;
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #4338ca;
}

/* FAQ */

.section-title {
    margin-top: 40px;
    margin-bottom: 15px;
    font-size: 24px;
    font-weight: 700;
}

.faq-item {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
}

.question {
    padding: 18px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

.question:hover {
    background: #1e293b;
}

.answer {
    display: none;
    padding: 18px;
    border-top: 1px solid #1f2937;
    color: #cbd5e1;
    line-height: 1.6;
}

/* STATUS */

.pending {
    color: #facc15;
    font-style: italic;
}

/* MOBILE */

@media (max-width: 768px) {
    header h1 {
        font-size: 32px;
    }

    .ask-card {
        margin-top: -20px;
    }
}
</style>
</head>

<body>

<header>
    <h1>📘 FAQ du Serveur</h1>
    <p>Trouve rapidement une réponse ou pose une nouvelle question</p>

    <div class="search-box">
        <input
            id="search"
            type="text"
            placeholder="Rechercher une question..."
        >
    </div>
</header>

<div class="container">

    <!-- QUESTION FORM -->
    <div class="ask-card">
        <h2>❓ Poser une question</h2>
        <p>
            Si la réponse n’existe pas encore, pose ta question ici.
            Elle sera ajoutée automatiquement avec le statut "en attente".
        </p>

        <form id="formspreeForm">
            <input
                id="questionInput"
                type="text"
                placeholder="Ex : Comment ajouter un nouveau film ?"
                required
            >

            <textarea
                id="detailsInput"
                placeholder="Ajoute ici des détails si besoin..."
            ></textarea>

            <button type="submit">
                Envoyer la question
            </button>
        </form>
    </div>

    <!-- FAQ LIST -->
    <div class="section-title">
        Questions existantes
    </div>

    <div id="faq"></div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const PART1 = "github_pat_XXXXXXXXXXXXXXXXXXXXXXXX";
const PART2 = "XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX";
const TOKEN = PART1 + PART2;

const OWNER = "monmonint";
const REPO = "FAQ";
const PATH = "faq.json";
const BRANCH = "main";

/* =========================
   FAQ DATA
========================= */

let faqData = [];

/* =========================
   LOAD FAQ
========================= */

async function loadFAQ() {
    try {
        const res = await fetch("./faq.json");
        faqData = await res.json();
        render(faqData);
    } catch (error) {
        console.error(error);
        document.getElementById("faq").innerHTML =
            "<p>Impossible de charger la FAQ.</p>";
    }
}

/* =========================
   RENDER FAQ
========================= */

function render(data) {
    const container = document.getElementById("faq");
    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = "<p>Aucun résultat trouvé.</p>";
        return;
    }

    data.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "faq-item";

        const answerClass =
            item.answer.toLowerCase() === "en attente"
                ? "answer pending"
                : "answer";

        div.innerHTML = `
            <div class="question">
                ${index + 1}. ${item.question}
            </div>
            <div class="${answerClass}">
                ${item.answer}
            </div>
        `;

        div.querySelector(".question").addEventListener("click", () => {
            const answer = div.querySelector(".answer");
            answer.style.display =
                answer.style.display === "block"
                    ? "none"
                    : "block";
        });

        container.appendChild(div);
    });
}

/* =========================
   SEARCH
========================= */

document.getElementById("search").addEventListener("input", (e) => {
    const value = e.target.value.toLowerCase();

    const filtered = faqData.filter(item =>
        item.question.toLowerCase().includes(value) ||
        item.answer.toLowerCase().includes(value) ||
        (item.category || "").toLowerCase().includes(value)
    );

    render(filtered);
});

/* =========================
   ADD TO GITHUB JSON
========================= */

async function addToGithub(question) {
    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

    const getRes = await fetch(url, {
        method: "GET",
        headers: {
            Authorization: `token ${TOKEN}`,
            Accept: "application/vnd.github+json"
        }
    });

    const file = await getRes.json();

    const cleanContent = file.content.replace(/\n/g, "");
    const decoded = atob(cleanContent);
    const json = JSON.parse(decoded);

    json.push({
        category: "Utilisateur",
        question: question,
        answer: "en attente"
    });

    const updatedContent = btoa(
        unescape(
            encodeURIComponent(
                JSON.stringify(json, null, 2)
            )
        )
    );

    await fetch(url, {
        method: "PUT",
        headers: {
            Authorization: `token ${TOKEN}`,
            "Content-Type": "application/json",
            Accept: "application/vnd.github+json"
        },
        body: JSON.stringify({
            message: `Ajout FAQ : ${question}`,
            content: updatedContent,
            sha: file.sha,
            branch: BRANCH
        })
    });
}

/* =========================
   FORM SUBMIT
========================= */

document.getElementById("formspreeForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const question = document.getElementById("questionInput").value.trim();
    const details = document.getElementById("detailsInput").value.trim();

    if (!question) return;

    try {
        /* Formspree */
        await fetch("https://formspree.io/f/mdaybojz", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                question: question,
                details: details
            })
        });

        /* GitHub JSON */
        await addToGithub(question);

        alert("Question envoyée avec succès !");

        document.getElementById("questionInput").value = "";
        document.getElementById("detailsInput").value = "";

        loadFAQ();

    } catch (error) {
        console.error(error);
        alert("Erreur lors de l’envoi.");
    }
});

/* INIT */

loadFAQ();

</script>

</body>
</html>
