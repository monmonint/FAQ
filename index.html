<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ du Serveur</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Inter, system-ui, Arial, sans-serif;
    background: #f8fafc;
    color: #0f172a;
}

/* HEADER */

header {
    background: white;
    border-bottom: 1px solid #e2e8f0;
    padding: 20px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 20;
}

header h1 {
    margin: 0;
    font-size: 34px;
    font-weight: 700;
}

header p {
    margin-top: 8px;
    color: #64748b;
    font-size: 15px;
}

.search-box {
    margin-top: 22px;
    display: flex;
    justify-content: center;
}

#search {
    width: 100%;
    max-width: 720px;
    padding: 14px 18px;
    border: 1px solid #dbeafe;
    border-radius: 12px;
    font-size: 15px;
    background: #ffffff;
    outline: none;
}

/* LAYOUT */

.container {
    max-width: 1000px;
    margin: auto;
    padding: 32px 20px 80px;
}

/* SECTION */

.section-title {
    font-size: 24px;
    font-weight: 700;
    margin-top: 35px;
    margin-bottom: 8px;
}

.section-subtitle {
    color: #64748b;
    margin-bottom: 18px;
    font-size: 14px;
}

/* FAQ */

.faq-item {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
}

.question {
    padding: 18px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.2s;
}

.question:hover {
    background: #f8fafc;
}

.answer {
    display: none;
    padding: 18px;
    border-top: 1px solid #e2e8f0;
    color: #475569;
    line-height: 1.6;
}

.pending-answer {
    color: #b45309;
    font-style: italic;
}

.empty {
    background: white;
    border: 1px dashed #cbd5e1;
    border-radius: 14px;
    padding: 18px;
    color: #64748b;
}

/* FLOAT BUTTON */

.ask-button {
    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 100;
    background: #1e293b;
    color: white;
    border: none;
    border-radius: 999px;
    padding: 16px 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.12);
}

.ask-button:hover {
    background: #0f172a;
}

/* SIDEBAR FORM */

.sidebar {
    position: fixed;
    top: 0;
    right: -460px;
    width: 420px;
    max-width: 90%;
    height: 100%;
    background: white;
    border-left: 1px solid #e2e8f0;
    box-shadow: -10px 0 30px rgba(0,0,0,0.08);
    z-index: 200;
    transition: 0.3s ease;
    padding: 28px;
    overflow-y: auto;
}

.sidebar.open {
    right: 0;
}

.sidebar h2 {
    margin-top: 0;
    font-size: 26px;
}

.sidebar p {
    color: #64748b;
    font-size: 14px;
    line-height: 1.6;
}

.close-btn {
    position: absolute;
    top: 18px;
    right: 18px;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    width: auto;
    padding: 0;
    color: #475569;
}

input,
textarea {
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    background: white;
    color: #0f172a;
    font-size: 15px;
    outline: none;
}

textarea {
    min-height: 130px;
    resize: vertical;
}

.submit-btn {
    width: 100%;
    margin-top: 14px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.submit-btn:hover {
    background: #1d4ed8;
}

/* OVERLAY */

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.35);
    z-index: 150;
    display: none;
}

.overlay.show {
    display: block;
}

/* MOBILE */

@media (max-width: 768px) {
    header h1 {
        font-size: 28px;
    }

    .ask-button {
        right: 16px;
        bottom: 16px;
    }

    .sidebar {
        width: 100%;
        max-width: 100%;
        right: -100%;
    }
}
</style>
</head>

<body>

<header>
    <h1>FAQ du Serveur</h1>
   

    <div class="search-box">
        <input
            id="search"
            type="text"
            placeholder="Rechercher une question..."
        >
    </div>
</header>

<div class="container">

    <div class="section-title">
        Questions en attente
    </div>
    <div class="section-subtitle">
        Questions récemment posées, en attente de réponse.
    </div>
    <div id="pendingFaq"></div>

    <div class="section-title">
        Questions répondues
    </div>
    <div class="section-subtitle">
        Réponses déjà disponibles dans la FAQ.
    </div>
    <div id="answeredFaq"></div>

</div>

<!-- FLOAT BUTTON -->

<button class="ask-button" id="openSidebar">
    + Poser une question
</button>

<!-- OVERLAY -->

<div class="overlay" id="overlay"></div>

<!-- SIDEBAR -->

<div class="sidebar" id="sidebar">
    <button class="close-btn" id="closeSidebar">×</button>

    <h2>Poser une question</h2>

    <p>
        Vérifiez bien que la réponse n'est pas déjà présente ! 
        On vous répondra au plus vite sur cette même FAQ !
        <strong>en attente</strong>.
    </p>

    <form id="questionForm">
        <input
            id="questionInput"
            type="text"
            placeholder="Votre question"
            required
        >

        <textarea
            id="detailsInput"
            placeholder="Qui pose la question"
        ></textarea>

        <button class="submit-btn" type="submit">
            Envoyer la question
        </button>
    </form>
</div>

<script>

/* =========================
CONFIG
========================= */

const PART1 = "github_pat_11BVBQR4Y0KUGzpGsTZmmk_QpEL1l8v"; 
const PART2 = "3xoRmAhmhF1BoQHEvNjKSB1CkDB6LxDWnng4HII5B5Zon62i1YP"; 
const TOKEN = PART1 + PART2;

const OWNER = "monmonint";
const REPO = "FAQ";
const PATH = "faq.json";
const BRANCH = "main";

/* =========================
DATA
========================= */

let faqData = [];

/* =========================
SIDEBAR
========================= */

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");

document.getElementById("openSidebar").addEventListener("click", () => {
    sidebar.classList.add("open");
    overlay.classList.add("show");
});

document.getElementById("closeSidebar").addEventListener("click", closeSidebar);
overlay.addEventListener("click", closeSidebar);

function closeSidebar() {
    sidebar.classList.remove("open");
    overlay.classList.remove("show");
}

/* =========================
LOAD FAQ
========================= */

async function loadFAQ() {
    try {
        const timestamp = new Date().getTime();

        const res = await fetch(`./faq.json?v=${timestamp}`, {
            cache: "no-store"
        });

        if (!res.ok) {
            throw new Error("Impossible de charger faq.json");
        }

        faqData = await res.json();
        faqData.reverse();

        render(faqData);

    } catch (error) {
        console.error(error);

        document.getElementById("pendingFaq").innerHTML =
            `<div class="empty">Impossible de charger la FAQ.</div>`;

        document.getElementById("answeredFaq").innerHTML = "";
    }
}

/* =========================
RENDER
========================= */

function render(data) {
    const pendingContainer = document.getElementById("pendingFaq");
    const answeredContainer = document.getElementById("answeredFaq");

    pendingContainer.innerHTML = "";
    answeredContainer.innerHTML = "";

    const pending = data.filter(item =>
        item.answer &&
        item.answer.toLowerCase() === "en attente"
    );

    const answered = data.filter(item =>
        !item.answer ||
        item.answer.toLowerCase() !== "en attente"
    );

    renderSection(pending, pendingContainer, true);
    renderSection(answered, answeredContainer, false);
}

function renderSection(list, container, isPending) {
    if (list.length === 0) {
        container.innerHTML = `
            <div class="empty">
                Aucun élément ici pour le moment.
            </div>
        `;
        return;
    }

    list.forEach(item => {
        const div = document.createElement("div");
        div.className = "faq-item";

        const answerClass = isPending
            ? "answer pending-answer"
            : "answer";

        div.innerHTML = `
            <div class="question">${item.question}</div>
            <div class="${answerClass}">
                ${item.answer || "Aucune réponse"}
            </div>
        `;

        div.querySelector(".question").addEventListener("click", () => {
            const answer = div.querySelector(".answer");

            answer.style.display =
                answer.style.display === "block"
                    ? "none"
                    : "block";
        });

        container.appendChild(div);
    });
}

/* =========================
SEARCH
========================= */

document.getElementById("search").addEventListener("input", (e) => {
    const value = e.target.value.toLowerCase().trim();

    if (!value) {
        render(faqData);
        return;
    }

    const filtered = faqData.filter(item =>
        (item.question || "").toLowerCase().includes(value) ||
        (item.answer || "").toLowerCase().includes(value) ||
        (item.category || "").toLowerCase().includes(value)
    );

    render(filtered);
});

/* =========================
ADD TO GITHUB
========================= */

async function addToGithub(question) {
    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`;

    const getRes = await fetch(url, {
        method: "GET",
        headers: {
            Authorization: `token ${TOKEN}`,
            Accept: "application/vnd.github+json"
        }
    });

    if (!getRes.ok) {
        throw new Error("Impossible de lire faq.json");
    }

    const file = await getRes.json();

    const cleanContent = file.content.replace(/\n/g, "");
    const decoded = atob(cleanContent);
    const json = JSON.parse(decoded);

    json.push({
        category: "Utilisateur",
        question: question,
        answer: "en attente"
    });

    const updatedContent = btoa(
        unescape(
            encodeURIComponent(
                JSON.stringify(json, null, 2)
            )
        )
    );

    const putRes = await fetch(url, {
        method: "PUT",
        headers: {
            Authorization: `token ${TOKEN}`,
            "Content-Type": "application/json",
            Accept: "application/vnd.github+json"
        },
        body: JSON.stringify({
            message: `Ajout FAQ : ${question}`,
            content: updatedContent,
            sha: file.sha,
            branch: BRANCH
        })
    });

    if (!putRes.ok) {
        throw new Error("Impossible d'écrire dans faq.json");
    }
}

/* =========================
FORM SUBMIT
========================= */

document.getElementById("questionForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const question = document.getElementById("questionInput").value.trim();
    const details = document.getElementById("detailsInput").value.trim();

    if (!question) return;

    try {
        await fetch("https://formspree.io/f/mdaybojz", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                question: question,
                details: details
            })
        });

        await addToGithub(question);

        alert(
"Question envoyée avec succès !\n\n" +
"On y répond au plus vite !\n" +
"Elle apparaitra comme en attente dans quelques minutes"
);

        document.getElementById("questionInput").value = "";
        document.getElementById("detailsInput").value = "";

        closeSidebar();

        setTimeout(() => {
            loadFAQ();
        }, 3000);

    } catch (error) {
        console.error(error);
        alert("Erreur lors de l’envoi.");
    }
});

/* INIT */

loadFAQ();

</script>

</body>
</html>
